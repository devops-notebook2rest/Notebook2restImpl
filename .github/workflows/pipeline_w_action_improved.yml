name: Build_and_redeploy_with_N2R

concurrency:
  group: notebook2rest-pipeline
  cancel-in-progress: true

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.poll.outputs.should_run }}
      latest_commit: ${{ steps.poll.outputs.latest_commit }}

    steps:
      - name: Poll Notebook Repository
        uses: devops-notebook2rest/check-notebook-changes@v0.32
        with:
          notebook_repository_url: https://github.com/devops-notebook2rest/vl-laserfarm.git

  notebook2rest-setup:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-north-1
      EKS_CLUSTER_NAME: notebook2rest_cluster
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      REPOSITORY: notebook2rest/api
      IMAGE_TAG: ${{ github.sha }}-${{ github.run_number }}
      NOTEBOOK_REPOSITORY_NAME: vl-laserfarm
      NOTEBOOK_REPOSITORY_URL: https://github.com/devops-notebook2rest/vl-laserfarm.git

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Retrieve the notebook repository
        run: |
          git clone ${{ env.NOTEBOOK_REPOSITORY_URL }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install notebook2rest
        run: |
          git clone https://github.com/devops-notebook2rest/notebook2rest.git

      - name: Run notebook2rest
        run: |
          cd notebook2rest
          python3 src/main.py ../${{ env.NOTEBOOK_REPOSITORY_NAME }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG notebook2rest/build
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Deploy Helm chart
        run: |
          helm upgrade --install my-api notebook2rest/templates/helm \
            --namespace default \
            --set image.repository=259361438396.dkr.ecr.eu-north-1.amazonaws.com/notebook2rest/api \
            --set image.tag=$IMAGE_TAG